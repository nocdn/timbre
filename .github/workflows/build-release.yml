name: Build And Release MSI

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish_release:
        description: Publish a GitHub prerelease
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-2022
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      DOTNET_INSTALL_DIR: ${{ github.workspace }}\\.dotnet
      DotnetExe: ${{ github.workspace }}\\.dotnet\\dotnet.exe
      Configuration: Release
      InstallerProject: installer/timbre.installer.wixproj
      InstallerOutput: ${{ github.workspace }}\\installer\\bin\\Release\\timbre.installer.msi
      AppPayloadOutput: ${{ github.workspace }}\\timbre\\bin\\x64\\Release\\net8.0-windows10.0.19041.0\\win-x64

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Compute build metadata
        id: metadata
        shell: pwsh
        run: |
          $shortSha = "${env:GITHUB_SHA}".Substring(0, 7)
          $isRelease = "${env:GITHUB_REF}" -match '^refs/tags/v(.+)$'

          if ($isRelease) {
            $version = $Matches[1]
            $tagName = "v$version"
            $releaseName = "v$version"
            $msiName = "timbre-$version-x64.msi"
            $portableZipName = "timbre-$version-x64-portable.zip"
          }
          else {
            $version = "0.0.${env:GITHUB_RUN_NUMBER}"
            $safeRefName = "${env:GITHUB_REF_NAME}" -replace '[^0-9A-Za-z.-]', '-'
            $tagName = "preview-$safeRefName-$shortSha"
            $releaseName = "Preview $version ($shortSha)"
            $msiName = "timbre-$version-$shortSha-x64.msi"
            $portableZipName = "timbre-$version-$shortSha-x64-portable.zip"
          }

          "short_sha=$shortSha" >> $env:GITHUB_OUTPUT
          "is_release=$isRelease" >> $env:GITHUB_OUTPUT
          "package_version=$version" >> $env:GITHUB_OUTPUT
          "tag_name=$tagName" >> $env:GITHUB_OUTPUT
          "release_name=$releaseName" >> $env:GITHUB_OUTPUT
          "msi_name=$msiName" >> $env:GITHUB_OUTPUT
          "portable_zip_name=$portableZipName" >> $env:GITHUB_OUTPUT

      - name: Build MSI
        shell: pwsh
        run: |
          & $env:DotnetExe build .\timbre\timbre.csproj -c $env:Configuration -p:Platform=x64 -p:RuntimeIdentifier=win-x64 -p:SelfContained=true
          & $env:DotnetExe build $env:InstallerProject -c $env:Configuration -p:PackageVersion=${{ steps.metadata.outputs.package_version }} -p:SkipAppPublish=true

      - name: Prepare release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force | Out-Null

          Copy-Item $env:InstallerOutput (Join-Path release '${{ steps.metadata.outputs.msi_name }}') -Force

          if (Test-Path $env:AppPayloadOutput) {
            Compress-Archive -Path (Join-Path $env:AppPayloadOutput '*') -DestinationPath (Join-Path release '${{ steps.metadata.outputs.portable_zip_name }}') -Force
          }
          else {
            throw "App payload folder not found: $env:AppPayloadOutput"
          }

      - name: Generate release notes
        shell: pwsh
        run: |
          $isRelease = '${{ steps.metadata.outputs.is_release }}' -eq 'True'

          if ($isRelease) {
            @(
              "## Timbre ${{ steps.metadata.outputs.release_name }}",
              "",
              "Commit: ``${{ github.sha }}``",
              "",
              "### Assets",
              "- ``${{ steps.metadata.outputs.msi_name }}`` — Windows installer",
              "- ``${{ steps.metadata.outputs.portable_zip_name }}`` — Portable (no install required)"
            ) | Set-Content -Path release-notes.md
          }
          else {
            @(
              "Preview build for commit ${{ github.sha }}.",
              "",
              "Branch: ${{ github.ref_name }}",
              "MSI version: ${{ steps.metadata.outputs.package_version }}",
              "Commit: ${{ steps.metadata.outputs.short_sha }}",
              "",
              "Assets:",
              "- ${{ steps.metadata.outputs.msi_name }}",
              "- ${{ steps.metadata.outputs.portable_zip_name }}"
            ) | Set-Content -Path release-notes.md
          }

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        if: ${{ !env.ACT }}
        with:
          name: timbre-${{ steps.metadata.outputs.package_version }}-${{ steps.metadata.outputs.short_sha }}
          path: |
            release/*.msi
            release/*.zip
            release-notes.md
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        if: ${{ steps.metadata.outputs.is_release == 'True' }}
        with:
          tag_name: ${{ steps.metadata.outputs.tag_name }}
          name: ${{ steps.metadata.outputs.release_name }}
          body_path: release-notes.md
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: true
          files: |
            release/*.msi
            release/*.zip

      - name: Publish GitHub prerelease
        uses: softprops/action-gh-release@v2
        if: ${{ steps.metadata.outputs.is_release != 'True' && (github.event_name != 'workflow_dispatch' || inputs.publish_release) }}
        with:
          tag_name: ${{ steps.metadata.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.metadata.outputs.release_name }}
          body_path: release-notes.md
          prerelease: true
          make_latest: false
          fail_on_unmatched_files: true
          files: |
            release/*.msi
            release/*.zip
