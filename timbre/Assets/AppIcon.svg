        <rect x="240" y="240" width="72" height="72" fill="#DDDDDD" fill-opacity="0.2" />
        <rect x="312" y="168" width="72" height="72" fill="#DDDDDD" fill-opacity="0.2" />
        <rect x="168" y="312" width="72" height="72" fill="#DDDDDD" fill-opacity="0.2" />
        <rect x="312" y="312" width="72" height="72" fill="#DDDDDD" />
        <rect x="240" y="96" width="72" height="72" fill="#DDDDDD" />
        <rect x="96" y="240" width="72" height="72" fill="#DDDDDD" />
    </g>
</svg>
